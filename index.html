<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>負けメモ</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><h1>🎮 負けメモ</h1></header>
  <form id="memoForm">
    <label>自分の機体: <input type="text" id="myMecha" required maxlength="20"></label>
    <label>相方機体: <input type="text" id="partner" maxlength="20"></label>
    <label>対面1: <input type="text" id="opp1" maxlength="20"></label>
    <label>対面2: <input type="text" id="opp2" maxlength="20"></label>
    
    <fieldset>
      <legend>負け要因（複数OK）</legend>
  
      <label><input type="checkbox" value="基本行動操作ミス"> 基本行動操作ミス</label>
      <label><input type="checkbox" value="キャラコンミス"> キャラコンミス</label>
      <label><input type="checkbox" value="タイマン読み負け"> タイマン読み負け</label>
      <label><input type="checkbox" value="ボタン押しすぎ"> ボタン押しすぎ</label>
      <label><input type="checkbox" value="対面機体の理解不足"> 対面機体の理解度不足</label>
      <label><input type="checkbox" value="見てない方からの被弾"> 見てない方からの被弾</label>
      <label><input type="checkbox" value="立ち位置ミス">立ち位置ミス </label>
      <label><input type="checkbox" value="前に出るのが早い"> 前に出るのが早い </label>
      <label><input type="checkbox" value="前に出るのが遅い"> 前に出るのが遅い</label>
      <label><input type="checkbox" value="下がるべきタイミングで前に出る"> 下がるべきタイミングで前に出る</label>
      <label><input type="checkbox" value="半覚はけなかった"> 半覚はけなかった</label>
      <label><input type="checkbox" value="フル覚出し渋り"> フル覚出し渋り</label>
      <label><input type="checkbox" value="覚醒タイミングが早すぎた"> 覚醒タイミングが早すぎた</label>
      <label><input type="checkbox" value="バリアの無駄遣い"> バリアの無駄遣い</label>
      <label><input type="checkbox" value="その他" id="otherReasonCb"> その他
        <input type="text" id="otherReason" placeholder="詳細" style="display:none; margin-left:10px;" maxlength="30">
      </label>
    </fieldset>
    
    <label>メモ（自由記述）:
      <textarea id="memoText" rows="4" placeholder="反省点・気づき・次回の対策など" maxlength="500"></textarea>
    </label>
    
    <button type="submit">💾 保存</button>
  </form>

  <section id="list"></section>

  <!-- 詳細表示モーダル -->
  <div id="detailModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>詳細</h2>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  </script>
</body>
</html>
